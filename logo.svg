<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 130" width="220" height="130">
  <defs>
    <style>
      .stroke { fill: none; stroke: #c5c0ba; stroke-width: 2.5; stroke-linecap: round; }
      .stroke-thin { fill: none; stroke: #c5c0ba; stroke-width: 1.8; stroke-linecap: round; }
      .conductor { fill: #c5c0ba; }
    </style>
  </defs>

  <g transform="translate(110, 116)">
    <!-- Fan boundary: outer arc and straight edges -->
    <path class="stroke" d="M -100,0 A 100,100 0 0,1 100,0"/>
    <line class="stroke" x1="0" y1="0" x2="-100" y2="0"/>
    <line class="stroke" x1="0" y1="0" x2="100" y2="0"/>

    <!-- Left radial divider at 138deg (conductor to outer arc) -->
    <line class="stroke-thin" x1="0" y1="0" x2="-74.3" y2="-66.9"/>

    <!-- Right radial divider at 32deg (conductor to outer arc) -->
    <line class="stroke-thin" x1="0" y1="0" x2="84.8" y2="-53.0"/>

    <!-- Inner arcs: spans between the two radial dividers -->
    <!-- Arc r=76, from 138deg to 32deg -->
    <path class="stroke-thin" d="M -56.5,-50.9 A 76,76 0 0,1 64.4,-40.3"/>
    <!-- Arc r=54, from 138deg to 32deg -->
    <path class="stroke-thin" d="M -40.1,-36.1 A 54,54 0 0,1 45.8,-28.6"/>
    <!-- Arc r=34, from 138deg to 32deg -->
    <path class="stroke-thin" d="M -25.3,-22.7 A 34,34 0 0,1 28.8,-18.0"/>

    <!-- Center divider: conductor up to 2nd arc only -->
    <line class="stroke-thin" x1="0" y1="0" x2="0" y2="-76"/>

    <!-- Conductor circle -->
    <circle class="conductor" cx="0" cy="0" r="7"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#c5c0ba" stroke-width="1.5"/>
  </g>
</svg>
